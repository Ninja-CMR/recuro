<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <!-- Definition of gradients and filters -->
  <defs>
    <!-- Logo specific gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
    
    <!-- Subtle drop shadow for the mark -->
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#4F46E5" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- The "R" / Leaf Mark -->
  <g transform="translate(15, 25)" filter="url(#markShadow)">
    <path d="M40 0 C 80 0, 100 20, 100 50 C 100 70, 85 85, 65 95 L 90 120 L 60 120 L 40 95 L 35 95 L 35 120 L 10 120 L 10 0 Z M 35 25 L 35 70 C 55 70, 70 60, 70 45 C 70 30, 55 25, 40 25 Z" fill="url(#logoGrad)" />
    <!-- Overlay swoosh for dynamism -->
    <path d="M 15 50 C 40 30, 80 40, 95 75 C 85 45, 45 45, 15 65 Z" fill="#ffffff" opacity="0.3" />
  </g>

  <!-- Text Group -->
  <g transform="translate(130, 0)">
    <!-- Primary Name -->
    <text x="0" y="85" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="64" fill="#1E293B" letter-spacing="-1.5">
      Recuro
    </text>
    
    <!-- Baseline "Facturation Élégante" -->
    <text x="5" y="118" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#64748B" letter-spacing="2">
      FACTURATION ÉLÉGANTE
    </text>
  </g>
</svg>
